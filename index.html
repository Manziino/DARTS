<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darts Master</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0b0e14; color: #fff; padding: 15px; }
        .hidden { display: none !important; }
        .card { background: #131722; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .tab-btn { padding: 10px; background: #1e2433; display: inline-block; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: #00e676; color: #000; }
        .btn-primary { width: 100%; padding: 15px; background: #00e676; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        .key { padding: 15px; background: #1e2433; border: none; color: #fff; border-radius: 5px; }
    </style>
</head>
<body>
<div id="app">
    <div id="menu" class="card">
        <div onclick="switchTab('match')"><span class="tab-btn active" id="btn-match">Match</span></div>
        <div id="setup-match">
            <h3>Joueurs</h3>
            <div id="players-list"></div>
            <input type="text" id="p-name" placeholder="Nom du joueur">
            <button onclick="addPlayer()">Ajouter Joueur</button>
            <button class="btn-primary" onclick="startMatch()">LANCER PARTIE</button>
        </div>
        <div id="history-view" class="hidden">
            <h3>Historique</h3>
            <div id="hist-content"></div>
            <button onclick="clearHistory()">Vider</button>
        </div>
    </div>
    <div id="game" class="card hidden">
        <h2 id="score-display">501</h2>
        <div id="controls">
            <input type="number" id="dart-input">
            <button onclick="submitScore()">OK</button>
        </div>
    </div>
</div>
<script>
    let players = JSON.parse(localStorage.getItem('players') || '[]');
    let history = JSON.parse(localStorage.getItem('hist') || '[]');

    function addPlayer() {
        let name = document.getElementById('p-name').value;
        if(name) { players.push({name, score: 501}); localStorage.setItem('players', JSON.stringify(players)); render(); }
    }
    
    function startMatch() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
    }

    function submitScore() {
        let pts = parseInt(document.getElementById('dart-input').value);
        players[0].score -= pts;
        if(players[0].score <= 0) {
            history.unshift({date: new Date().toLocaleDateString(), winner: players[0].name});
            localStorage.setItem('hist', JSON.stringify(history));
            alert("Victoire !");
            location.reload();
        }
        document.getElementById('score-display').innerText = players[0].score;
    }

    function render() {
        document.getElementById('players-list').innerHTML = players.map(p => `<div>${p.name}</div>`).join('');
    }
    
    function switchTab(t) {
        document.getElementById('setup-match').classList.toggle('hidden', t !== 'match');
        document.getElementById('history-view').classList.toggle('hidden', t !== 'match');
    }

    function clearHistory() { localStorage.removeItem('hist'); location.reload(); }

    render();
</script>
</body>
</html>
